<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 580" width="1800" height="580">
  <defs>
    <style>
      @font-face {
        font-family: 'Playfair Display';
        font-style: normal;
      }
    </style>

    <!-- Grain filter -->
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="28" flood-color="#18160F" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadowBack" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="28" flood-color="#18160F" flood-opacity="0.14"/>
    </filter>

    <!-- Radial gradients for front card -->
    <radialGradient id="frontBg" cx="70%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#EDE5D8" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#F5F1EA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FAF8F4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="frontBg2" cx="15%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#D6C4A8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FAF8F4" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold line gradient -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8975A"/>
      <stop offset="60%" stop-color="#D4B47A"/>
      <stop offset="100%" stop-color="#B8975A" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Back card gradient -->
    <linearGradient id="backBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1C14"/>
      <stop offset="100%" stop-color="#18160F"/>
    </linearGradient>
    <radialGradient id="backGlow" cx="75%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#B8975A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#18160F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="backGlow2" cx="20%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#8A9BAA" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#18160F" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip paths for rounded corners -->
    <clipPath id="frontClip">
      <rect x="40" y="40" width="820" height="500" rx="18" ry="18"/>
    </clipPath>
    <clipPath id="backClip">
      <rect x="940" y="40" width="820" height="500" rx="18" ry="18"/>
    </clipPath>
  </defs>

  <!-- =============================================
       FRONT CARD
  ============================================= -->
  <g filter="url(#cardShadow)">
    <!-- Card base -->
    <rect x="40" y="40" width="820" height="500" rx="18" fill="#FAF8F4"/>
    <!-- Warm gradient overlays -->
    <rect x="40" y="40" width="820" height="500" rx="18" fill="url(#frontBg)"/>
    <rect x="40" y="40" width="820" height="500" rx="18" fill="url(#frontBg2)"/>
    <!-- Grain texture -->
    <rect x="40" y="40" width="820" height="500" rx="18" fill="#D6C4A8" opacity="0.04" filter="url(#grain)"/>
  </g>

  <!-- Vertical gold accent line -->
  <rect x="112" y="80" width="1" height="420" fill="url(#goldLine)" opacity="0.5"/>

  <!-- Gold dot top -->
  <circle cx="112" cy="76" r="3.5" fill="#B8975A"/>
  <!-- Gold dot bottom -->
  <circle cx="112" cy="504" r="3.5" fill="#B8975A" opacity="0.4"/>

  <!-- LOGO: Kelvin. -->
  <!-- "Kelvin" in dark ink -->
  <text
    x="152"
    y="136"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="700"
    font-size="46"
    letter-spacing="1.5"
    fill="#18160F"
  >Kelvin</text>
  <!-- Gold dot -->
  <text
    x="315"
    y="136"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="700"
    font-size="46"
    fill="#B8975A"
  >.</text>

  <!-- Eyebrow label -->
  <text
    x="152"
    y="168"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="400"
    font-size="11"
    letter-spacing="3.5"
    fill="#9A9590"
  >WEB DESIGNER &amp; DEVELOPER</text>

  <!-- Thin separator -->
  <rect x="152" y="188" width="280" height="0.75" fill="#B8975A" opacity="0.35"/>

  <!-- Name — large serif -->
  <text
    x="152"
    y="290"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="700"
    font-size="62"
    letter-spacing="-1"
    fill="#18160F"
  >Kelvin</text>
  <text
    x="152"
    y="358"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="400"
    font-style="italic"
    font-size="62"
    letter-spacing="-1"
    fill="#5A5650"
  >Segerink</text>

  <!-- Contact details — bottom right cluster -->
  <!-- Email -->
  <text
    x="680"
    y="400"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="300"
    font-size="13"
    letter-spacing="0.3"
    fill="#5A5650"
    text-anchor="end"
  >hello@kelvinsegerink.nl</text>

  <!-- Website -->
  <text
    x="680"
    y="424"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="300"
    font-size="13"
    letter-spacing="0.3"
    fill="#5A5650"
    text-anchor="end"
  >kelvinsegerink.nl</text>

  <!-- Phone -->
  <text
    x="680"
    y="448"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="300"
    font-size="13"
    letter-spacing="0.3"
    fill="#5A5650"
    text-anchor="end"
  >+31 6 00 000 000</text>

  <!-- Location -->
  <text
    x="680"
    y="472"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="300"
    font-size="13"
    letter-spacing="0.3"
    fill="#9A9590"
    text-anchor="end"
  >Flevoland, Nederland</text>

  <!-- Gold accent dot before location -->
  <circle cx="560" cy="468" r="2.5" fill="#B8975A" opacity="0.7"/>

  <!-- Card border -->
  <rect x="40" y="40" width="820" height="500" rx="18" fill="none" stroke="#18160F" stroke-width="0.5" opacity="0.06"/>


  <!-- =============================================
       BACK CARD
  ============================================= -->
  <g filter="url(#cardShadowBack)">
    <rect x="940" y="40" width="820" height="500" rx="18" fill="url(#backBg)"/>
    <rect x="940" y="40" width="820" height="500" rx="18" fill="url(#backGlow)"/>
    <rect x="940" y="40" width="820" height="500" rx="18" fill="url(#backGlow2)"/>
    <rect x="940" y="40" width="820" height="500" rx="18" fill="#B8975A" opacity="0.015" filter="url(#grain)"/>
  </g>

  <!-- Abstract soft shape back -->
  <ellipse cx="1530" cy="200" rx="260" ry="220" fill="#B8975A" opacity="0.055"/>
  <ellipse cx="1010" cy="420" rx="180" ry="150" fill="#8A9BAA" opacity="0.04"/>

  <!-- Thin gold horizontal lines -->
  <rect x="980" y="180" width="740" height="0.75" fill="#B8975A" opacity="0.15"/>
  <rect x="980" y="400" width="740" height="0.75" fill="#B8975A" opacity="0.15"/>

  <!-- Large ghost KELVIN watermark -->
  <text
    x="1350"
    y="360"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="900"
    font-size="185"
    letter-spacing="-4"
    fill="none"
    stroke="#FAF8F4"
    stroke-width="0.5"
    opacity="0.04"
    text-anchor="middle"
  >KELVIN</text>

  <!-- Centered logo on back -->
  <!-- "Kelvin" -->
  <text
    x="1310"
    y="272"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="700"
    font-size="52"
    letter-spacing="1.5"
    fill="#FAF8F4"
    text-anchor="end"
  >Kelvin</text>
  <!-- Gold dot -->
  <text
    x="1316"
    y="272"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="700"
    font-size="52"
    fill="#B8975A"
    text-anchor="start"
  >.</text>

  <!-- Tagline on back -->
  <text
    x="1350"
    y="312"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="300"
    font-size="11"
    letter-spacing="3.8"
    fill="#FAF8F4"
    opacity="0.35"
    text-anchor="middle"
  >PREMIUM WEB DESIGN</text>

  <!-- Small gold line under tagline -->
  <rect x="1290" y="326" width="120" height="0.75" fill="#B8975A" opacity="0.5" x="1290"/>
  <line x1="1290" y1="326" x2="1410" y2="326" stroke="#B8975A" stroke-width="0.75" opacity="0.5"/>

  <!-- Card border back -->
  <rect x="940" y="40" width="820" height="500" rx="18" fill="none" stroke="#FAF8F4" stroke-width="0.5" opacity="0.06"/>

  <!-- Labels below cards -->
  <text x="450" y="560" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" letter-spacing="2.5" fill="#9A9590" text-anchor="middle">VOORKANT</text>
  <text x="1350" y="560" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" letter-spacing="2.5" fill="#9A9590" text-anchor="middle">ACHTERKANT</text>
</svg>
